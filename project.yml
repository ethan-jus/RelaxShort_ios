name: RelaxShort
options:
  bundleIdPrefix: com.relaxshort
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: "11.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: P7QAX68962

targets:
  RelaxShort:
    type: application
    platform: iOS
    sources:
      - RelaxShort
    dependencies:
      - package: GoogleMobileAds
    settings:
      base:
        INFOPLIST_FILE: RelaxShort/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.relaxshort.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: RelaxShort/Info.plist
      properties:
        NSAppTransportSecurity:
          NSExceptionDomains:
            cdn.bjyoushi.top:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        CFBundleName: RelaxShort
        CFBundleDisplayName: RelaxShort
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        GADApplicationIdentifier: ca-app-pub-1181692914441160~7575609396
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
        NSUserTrackingUsageDescription: "为了提供个性化广告，我们需要获取您的广告标识符"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
